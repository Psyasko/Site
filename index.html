<html lang="uk">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>YSQ-S3 — Особистий кабінет</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap');

  :root {
    --bg-color: #161512;
    --card-bg: #1f1c18;
    --accent-amber: #b87a35;
    --accent-glow: #d4a060;
    --text-main: #d9cdbc;
    --text-muted: #857a6b;
    --border-soft: rgba(184, 122, 53, 0.15);
    --radius: 20px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    min-height: 100%;
    background-color: var(--bg-color);
    font-family: 'Manrope', sans-serif;
    color: var(--text-main);
    display: flex;
    justify-content: center;
    overflow-x: hidden;
  }

  /* ГЕНЕРАТОР ТЕКСТУРИ "СВЕТРА" ТА М'ЯКОГО ШУМУ */
  .noise-bg {
    position: fixed;
    inset: 0;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1;
  }

  .grid-overlay {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(212, 160, 96, 0.01) 3px, rgba(212, 160, 96, 0.01) 5px);
    pointer-events: none;
    z-index: 2;
  }

  /* ЗАГРАВА ЗАХОДУ СОНЦЯ */
  .sunset-glow {
    position: fixed;
    bottom: -150px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(circle, rgba(184, 122, 53, 0.12) 0%, rgba(212, 160, 96, 0.04) 50%, transparent 100%);
    filter: blur(60px);
    pointer-events: none;
    z-index: 3;
  }

  .wrap {
    width: 100%;
    max-width: 720px;
    padding: 40px 20px 80px 20px;
    position: relative;
    z-index: 10;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid var(--border-soft);
    padding-bottom: 16px;
    margin-bottom: 32px;
  }

  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--accent-glow);
    letter-spacing: 0.5px;
  }

  .nav-dummy {
    font-size: 13px;
    color: var(--text-muted);
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 400;
    margin: 0 0 8px 0;
    color: var(--text-main);
  }

  .desc {
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 32px;
  }

  /* КАРТКА ТЕСТУ */
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 32px;
    border: 1px solid rgba(184, 122, 53, 0.08);
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    position: relative;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .meta-info { flex: 1; }

  .qcounter {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 500;
    color: var(--accent-glow);
    margin-bottom: 8px;
  }

  /* ПРОГРЕС-БАР */
  .progress-bar {
    height: 3px;
    background: rgba(184, 122, 53, 0.08);
    border-radius: 2px;
    overflow: hidden;
    width: 80%;
  }
  .progress-inner {
    height: 100%;
    background: var(--accent-amber);
    width: 0%;
    transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* ПИТАННЯ */
  .question-container {
    min-height: 180px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .qtext {
    font-size: 18px;
    line-height: 1.6;
    font-weight: 400;
    margin-bottom: 28px;
    color: var(--text-main);
  }

  /* ШКАЛА 1-6 */
  .scale-wrapper {
    margin-bottom: 32px;
  }

  .scale-buttons {
    display: flex;
    gap: 8px;
    justify-content: space-between;
  }

  .scale-item {
    flex: 1;
    position: relative;
  }

  .scale-item input {
    position: absolute;
    opacity: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
    margin: 0;
  }

  .scale-item label {
    display: flex;
    height: 48px;
    align-items: center;
    justify-content: center;
    background: rgba(22, 21, 18, 0.4);
    border: 1px solid rgba(184, 122, 53, 0.1);
    border-radius: 8px;
    font-size: 15px;
    font-weight: 500;
    color: var(--text-muted);
    transition: all 0.15s ease;
  }

  .scale-item input:checked + label {
    background: rgba(184, 122, 53, 0.15);
    border-color: var(--accent-amber);
    color: var(--accent-glow);
    font-weight: 600;
    box-shadow: 0 0 15px rgba(184, 122, 53, 0.1);
  }

  .scale-legend {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-muted);
    padding: 0 2px;
  }

  /* ПОЛЕ ІМЕНІ */
  .input-group {
    border-top: 1px solid rgba(184, 122, 53, 0.08);
    padding-top: 24px;
    margin-top: 12px;
  }

  .input-group label {
    display: block;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 8px;
    letter-spacing: 0.3px;
  }

  .input-group input {
    width: 100%;
    background: rgba(22, 21, 18, 0.5);
    border: 1px solid rgba(184, 122, 53, 0.15);
    padding: 12px 16px;
    border-radius: 8px;
    color: var(--text-main);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s ease;
  }

  .input-group input:focus {
    border-color: var(--accent-amber);
  }

  /* КНОПКИ КЕРУВАННЯ */
  .controls {
    display: flex;
    gap: 12px;
    margin-top: 24px;
  }

  button {
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    padding: 12px 24px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    border: none;
  }

  .btn-primary {
    background: var(--accent-amber);
    color: #120d06;
  }
  .btn-primary:hover:not(:disabled) {
    background: var(--accent-glow);
  }

  .btn-ghost {
    background: transparent;
    border: 1px solid rgba(184, 122, 53, 0.2);
    color: var(--text-muted);
  }
  .btn-ghost:hover:not(:disabled) {
    border-color: var(--accent-amber);
    color: var(--text-main);
  }

  button:disabled {
    opacity: 0.25;
    cursor: not-allowed;
  }

  /* БЛОК РЕЗУЛЬТАТІВ */
  .result-box {
    margin-top: 32px;
    border-top: 1px solid var(--border-soft);
    padding-top: 32px;
    display: none;
  }

  .result-box h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    margin: 0 0 16px 0;
    color: var(--accent-glow);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 24px;
  }

  th, td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid rgba(184, 122, 53, 0.08);
    font-size: 14px;
  }

  th {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--text-muted);
    font-weight: 400;
  }

  .schema-desc-block {
    background: rgba(22, 21, 18, 0.3);
    border-radius: 8px;
    padding: 16px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-muted);
  }

  @media(max-width: 500px) {
    .card { padding: 20px; }
    .scale-buttons { gap: 4px; }
    .scale-item label { height: 40px; font-size: 13px; }
    .controls { flex-direction: column; }
    button { width: 100%; }
    header { flex-direction: column; gap: 8px; }
  }
</style>
</head>

for (const s in schemaMapping) { 
  schemaMapping[s].forEach(id => { 
    const q = questions.find(x => x.id === id); 
    if(q) q.schema = s; 
  }); 
}

const schemaDescriptionsText = {
  "Емоційна депривація (ED)": "Відчуття браку тепла, турботи, підтримки та розуміння.",
  "Покинутість / Нестабільність (AB)": "Страх втрати стосунків, нестабільність.",

  "Соціальна ізоляція / Відчуженість (SI)": "Відчуття відокремленості, «не такий як усі».",
  "Дефективність / Сором (DS)": "Переконання у власній «зіпсованості» та неповноцінності.",
  "Неуспішність (FA)": "Віра у власну некомпетентність у роботі/навчанні.",
  "Залежність / Некомпетентність (DI)": "Нездатність впоратися з повсякденністю без допомоги.",
  "Вразливість до шкоди та хвороб (VH)": "Постійний страх катастрофи чи хвороби.",
  "Злиття / Нерозвинена ідентичність (EM)": "Відсутність індивідуальності, розчинення в інших.",
  "Підкорення (SB)": "Придушення бажань заради уникнення гніву чи відкидання.",
  "Сапопожертва (SS)": "Добровільне задоволення потреб інших за власний рахунок.",
  "Пошук схвалення (AS)": "Залежність самооцінки від реакції інших.",
  "Негативізм / Песимізм (NP)": "Фокус на негативних аспектах життя.",
  "Емоційне пригнічення (EI)": "Стримування спонтанних емоцій.",
  "Жорсткі стандарти / Гіперкритичність (US)": "Надвисокі вимоги до себе, перфекціонізм.",
  "Привілейованість / Грандіозність (ET)": "Впевненість у праві на особливі умови.",
  "Недостатній самоконтроль (IS)": "Небажання терпіти дискомфорт чи стримувати імпульси.",
  "Пунітивність (Покарання) (PU)": "Нетерпимість, схильність карати за помилки."
};

let currentIndex = 0;
let answers = {};
const qArea = document.getElementById('questionArea');
const qCounter = document.getElementById('qCounter');
const progressInner = document.getElementById('progressInner');
const btnPrev = document.getElementById('btnPrev');
const btnNext = document.getElementById('btnNext');
const btnFinish = document.getElementById('btnFinish');
const btnReset = document.getElementById('btnReset');
const resultBox = document.getElementById('resultBox');

function renderQuestion(index){
  const q = questions[index];
  qArea.innerHTML = `
    <div aria-live="polite">
      <div class="qtext">${q.text}</div>
      <div class="scale-wrapper">
        <div class="scale-buttons">
          ${[1,2,3,4,5,6].map(v => {
            const checked = (answers[q.id] === v) ? 'checked' : '';
            return `
              <div class="scale-item">
                <input type="radio" id="q${q.id}_v${v}" name="q${q.id}" value="${v}" ${checked} onchange="handleAnswer(${q.id},${v})">
                <label for="q${q.id}_v${v}">${v}</label>
              </div>`;
          }).join('')}
        </div>
        <div class="scale-legend">
          <div>зовсім не про мене</div>
          <div>ідеально про мене</div>
        </div>
      </div>
    </div>`;

  qCounter.textContent = `Питання ${index+1} / ${questions.length}`;
  progressInner.style.width = `${Math.round((index / questions.length) * 100)}%`;
  btnPrev.disabled = (index === 0);
  btnNext.textContent = (index === questions.length - 1) ? 'Останнє питання' : 'Далі';
}

function handleAnswer(qid, val){
  answers[qid] = val;
  if (currentIndex < questions.length - 1) {
    setTimeout(() => { 
      currentIndex++; 
      renderQuestion(currentIndex); 
    }, 120);
  }
}

function prevQ(){ if(currentIndex > 0){ currentIndex--; renderQuestion(currentIndex); } }
function nextQ(){ if(currentIndex < questions.length - 1){ currentIndex++; renderQuestion(currentIndex); } }

function calculateResults(){
  const map = {};
  questions.forEach(q => {
    const s = q.schema || "Unknown";
    if(!map[s]) map[s] = {sum:0, count:0};
    const v = answers[q.id];
    if(v){ map[s].sum += v; map[s].count++; }
  });
  return Object.keys(map).map(k => ({ schema: k, sum: map[k].sum })).sort((a,b)=>b.sum - a.sum);
}

function getInterpretation(score) {
  if (score >= 25) return "<span style='color:var(--accent-glow); font-weight:600;'>Високий</span>";
  if (score >= 20) return "Середній";
  if (score >= 10) return "Легкий";
  return "—";
}

function showResults(){
  const results = calculateResults();
  const tbody = document.querySelector('#resultTable tbody');
  tbody.innerHTML = '';
  results.forEach(r => {
    if(r.sum > 0) tbody.innerHTML += `<tr><td>${r.schema}</td><td>${r.sum}</td><td>${getInterpretation(r.sum)}</td></tr>`;
  });
  
  const descBlock = document.getElementById('schemaDescriptions');
  const unique = Array.from(new Set(results.map(r=>r.schema)));
  descBlock.innerHTML = '<b style="color:var(--accent-glow)">Короткий довідник шкал:</b><br><br>' + unique.map(n => `<b>${n}:</b> ${schemaDescriptionsText[n]||''}`).join('<br>');
  
  resultBox.style.display = 'block';
  progressInner.style.width = '100%';
  
  saveResultsToGoogleSheet(results);
}

function finish() {
  const nameInput = document.getElementById('clientName');
  if (!nameInput || !nameInput.value.trim()) {
    alert("Будь ласка, введіть Ваше ім'я або псевдонім перед відправкою результатів.");
    nameInput.focus();
    nameInput.style.borderColor = '#b83535'; 
    return;
  } else {
    nameInput.style.borderColor = 'rgba(184, 122, 53, 0.15)';
  }

  const missing = questions.find(q => !answers[q.id]);
  if (missing) {
    alert(`Питання №${missing.id} пропущене. Перенаправляємо до нього.`);
    currentIndex = questions.findIndex(q => q.id === missing.id);
    renderQuestion(currentIndex);
  } else {
    showResults();
    resultBox.scrollIntoView({behavior:'smooth'});
  }
}

let resetConfirmation = false;
function resetTest() {
  const btn = document.getElementById('btnReset');
  
  if (!resetConfirmation) {
    resetConfirmation = true;
    const oldText = btn.innerText;
    
    btn.innerText = "Точно видалити?";
    btn.style.background = "#b83535";
    btn.style.color = "#fff";

    setTimeout(() => {
      resetConfirmation = false;
      btn.innerText = oldText;
      btn.style.background = "";
      btn.style.color = "";
    }, 3000);
    return;
  }

  answers = {}; 
  currentIndex = 0;
  
  const nameInput = document.getElementById('clientName');
  if(nameInput) nameInput.value = '';
  
  resultBox.style.display = 'none';
  progressInner.style.width = '0%';
  
  const btnFinish = document.getElementById('btnFinish');
  if(btnFinish) btnFinish.innerText = "Завершити та надіслати результати";

  renderQuestion(0);
  
  resetConfirmation = false;
  btn.innerText = "Скинути";
  btn.style.background = "";
  btn.style.color = "";
  
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function saveResultsToGoogleSheet(resultsData) {
  // ТВІЙ ДІЮЧИЙ GOOGLE WEB APP URL
  const webAppUrl = 'https://script.google.com/macros/s/AKfycbz8gGc1xBwvypl9Xhs0h6F_h_HKVLq5GBYfZV-saaxkveZoz1esMC9wRjrTIKMVXt9M/exec';
  
  const fixedSchemaOrder = [
    "Емоційна депривація (ED)","Покинутість / Нестабільність (AB)","Недовіра / Очікування зловживань (MA)",
    "Соціальна ізоляція / Відчуженість (SI)","Дефективність / Сором (DS)","Неуспішність (FA)",
    "Залежність / Некомпетентність (DI)","Вразливість до шкоди та хвороб (VH)","Злиття / Нерозвинена ідентичність (EM)",
    "Підкорення (SB)","Сапопожертва (SS)","Пошук схвалення (AS)",
    "Негативізм / Песимізм (NP)","Емоційне пригнічення (EI)","Жорсткі стандарти / Гіперкритичність (US)",
    "Привілейованість / Грандіозність (ET)","Недостатній самоконтроль (IS)","Пунітивність (Покарання) (PU)"
  ];

  const ordered = fixedSchemaOrder.map(name => {
    const r = resultsData.find(x => x.schema === name);
    return r || { schema: name, sum: 0 };
  });

  const clientName = document.getElementById('clientName').value.trim();

  const payload = { 
    clientName: clientName, 
    results: ordered.map(r => ({ schema: r.schema, sum: r.sum })) 
  };

  fetch(webAppUrl, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  }).then(() => {
    console.log("Відправлено в Google Docs");
    const btn = document.getElementById('btnFinish');
    btn.innerText = "Успішно збережено ✅";
    btn.style.borderColor = "var(--accent-amber)";
    btn.style.color = "var(--accent-glow)";
  }).catch(err => console.error(err));
}

btnPrev.addEventListener('click', prevQ);
btnNext.addEventListener('click', nextQ);
btnFinish.addEventListener('click', finish);
btnReset.addEventListener('click', resetTest);

renderQuestion(0);
</script>
